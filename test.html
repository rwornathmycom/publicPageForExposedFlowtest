<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salesforce Flow Embed Sample</title>
    <script src="https://laska--laskaqa.sandbox.my.site.com/lightning/lightning.out.js"></script>
</head>
<body>
    <div id="lightningLocator"></div>

    <script>
        const appName = 'c:EmbedFlowExternalWebsiteApp';
        const componentName = 'c:EmbedFlowExternalWebsite';
        const componentAttributes = {
            flowname: 'Case_SCREEN_Create_Case_from_Website'
        };
        const endpoint = 'https://laska--laskaqa.sandbox.my.site.com'.trim().replace(/\/+$/, '');

        $Lightning.use(
            appName,
            function () {
                $Lightning.createComponent(
                    componentName,
                    componentAttributes,
                    'lightningLocator',
                    function () {}
                );
            },
            endpoint
        );
    </script>
</body>
</html>
